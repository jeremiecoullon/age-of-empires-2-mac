<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Archery Range building - target practice area with covered structure -->

  <!-- Ground/foundation -->
  <rect x="16" y="140" width="160" height="40" fill="#8B7355" stroke="#5D4E37" stroke-width="2"/>

  <!-- Main wooden structure (open-sided shelter) -->
  <rect x="24" y="60" width="100" height="80" fill="#A0522D" stroke="#5D4E37" stroke-width="2"/>

  <!-- Roof -->
  <polygon points="24,60 74,20 124,60" fill="#654321" stroke="#3D2817" stroke-width="2"/>

  <!-- Support pillars -->
  <rect x="28" y="60" width="8" height="80" fill="#8B4513"/>
  <rect x="112" y="60" width="8" height="80" fill="#8B4513"/>

  <!-- Interior shadow (open front) -->
  <rect x="36" y="70" width="76" height="60" fill="#4A3728"/>

  <!-- Target on the right side -->
  <circle cx="155" cy="100" r="28" fill="#F5DEB3" stroke="#5D4E37" stroke-width="2"/>
  <circle cx="155" cy="100" r="20" fill="#CC0000"/>
  <circle cx="155" cy="100" r="12" fill="#FFFFFF"/>
  <circle cx="155" cy="100" r="5" fill="#CC0000"/>

  <!-- Arrows in target -->
  <line x1="145" y1="95" x2="155" y2="100" stroke="#8B4513" stroke-width="2"/>
  <line x1="148" y1="108" x2="155" y2="100" stroke="#8B4513" stroke-width="2"/>

  <!-- Bow rack inside shelter -->
  <rect x="44" y="80" width="4" height="40" fill="#DEB887"/>
  <rect x="56" y="80" width="4" height="40" fill="#DEB887"/>
  <rect x="68" y="80" width="4" height="40" fill="#DEB887"/>

  <!-- Bows on rack (curved lines) -->
  <path d="M 46 85 Q 50 95 46 105" stroke="#8B4513" stroke-width="2" fill="none"/>
  <path d="M 58 85 Q 62 95 58 105" stroke="#8B4513" stroke-width="2" fill="none"/>
  <path d="M 70 85 Q 74 95 70 105" stroke="#8B4513" stroke-width="2" fill="none"/>
</svg>
