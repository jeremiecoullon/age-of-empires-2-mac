<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Skirmisher unit - lightly armored javelin thrower -->

  <!-- Body (lighter armor than archer) -->
  <ellipse cx="24" cy="32" rx="8" ry="10" fill="#D2691E"/>

  <!-- Head -->
  <circle cx="24" cy="18" r="7" fill="#DEB887"/>

  <!-- Simple helmet -->
  <ellipse cx="24" cy="14" rx="7" ry="4" fill="#A9A9A9"/>

  <!-- Eyes -->
  <circle cx="22" cy="17" r="1" fill="#333"/>
  <circle cx="26" cy="17" r="1" fill="#333"/>

  <!-- Shield (on left arm - round) -->
  <circle cx="14" cy="30" r="8" fill="#8B4513" stroke="#5D4E37" stroke-width="2"/>
  <circle cx="14" cy="30" r="4" fill="#A0522D"/>

  <!-- Javelin (in right hand, ready to throw) -->
  <line x1="30" y1="22" x2="42" y2="10" stroke="#8B4513" stroke-width="3"/>
  <polygon points="42,10 44,14 40,12" fill="#708090"/>

  <!-- Right arm throwing position -->
  <line x1="28" y1="26" x2="32" y2="20" stroke="#DEB887" stroke-width="3"/>

  <!-- Extra javelins on back -->
  <line x1="20" y1="38" x2="22" y2="24" stroke="#8B4513" stroke-width="2"/>
  <line x1="22" y1="38" x2="24" y2="25" stroke="#8B4513" stroke-width="2"/>
</svg>
